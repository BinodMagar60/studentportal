<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student attendance</title>
    <link rel="stylesheet" href="css/admin-studentattendance-style.css">
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.0.1/remixicon.min.css"
      integrity="sha512-dTsohxprpcruDm4sjU92K0/Gf1nTKVVskNHLOGMqxmokBSkfOAyCzYSB6+5Z9UlDafFRpy5xLhvpkOImeFbX6A=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
</head>
<body>

     <!-- upper search or select part -->
     <form action="">
        <fieldset>
            <legend>Student</legend>
            <div class="search-student">
                <div class="select-opt">
                <div class="class">
                    <label for="classes">Class:</label>
                    <select name="classes" id="classes">
                        <option value="one">One</option>
                        <option value="two">Two</option>
                        <option value="three">Three</option>
                        <option value="four">Four</option>
                        <option value="five">Five</option>
                        <option value="six">Six</option>
                        <option value="seven">Seven</option>
                        <option value="eight">Eight</option>
                        <option value="nine">Nine</option>
                        <option value="ten">Ten</option>
                    </select>
                </div>
                <div class="section">
                    <label for="sections">Section:</label>
                    <select name="sections" id="sections">
                        <option value="A">A</option>
                        <option value="B">B</option>
                        <option value="C">C</option>
                    </select>
                </div>
                </div>
                <div class="go">
                    <button>Go</button>
                </div>
                </div>
            </div>
        </fieldset>
    </form>

    <!-- upper search or select class end -->

    <!-- display the record -->

    <div class="lower-content">
        <fieldset>
            <legend>Student list</legend>
            <div class="search-student-table">
                <div class="search">
                    <label for="search"><span class="search-here"><i class="ri-search-line"></i></span></label>
                    <input type="text" id="search" placeholder="Search here...">
                </div>
            </div>
        </fieldset>
    </div>

    <!-- display end -->


</body>
</html>
