<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link rel="stylesheet" href="../css/admin-userprofile-setting-style.css">
</head>

<body>
  <form enctype="multipart/form-data" novalidate autocomplete="off">
    <div class="change-password">
      <div class="topname">
        Change Password
      </div>
      <div class="password-contents">
        <div class="label-password">New Password</div>
        <div class="changepassword"><input id="new-password" type="Text" ></div>
        <div class="label-password label-password2">Re-enter Password</div>
        <div class="changepassword"><input id="re-enterpassword" type="text" ></div>
        <div class="update-btn"><button type="button" id="updateButton" onclick="updatePassword(event)" >Confirm</button></div>
        <div class="error"></div>
        <div class="error2"></div>
      </div>

    </div>
  </form>

<script src="../js/admin-userprofile-setting.js"></script>
</body>

</html>
