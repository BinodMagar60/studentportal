<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="../css/admin-userprofile-setting-style.css">
</head>
<body>
    <form id="adminForm" enctype="multipart/form-data" novalidate autocomplete="off">
        <div class="basic-info">
            <div class="topname">
                My Account
            </div>
            <div class="myinfo-container">
                <div class="info-photo">
                  <div class="intro">Profile Picture</div>
                    <div class="myimg">
                        <div class="circleline">
                          <img src="../extra/admin.jpg" alt="admin photo">
                        </div>
                        <div class="upload-file">
                          <label for="uploadimage" class="label-uploadphoto">
                            <div class="outerline-uploadphoto">
                              <div class="innerline-uploadphoto">
                                Upload Image
                              </div>
                            </div>
                          </label>
                          <input type="file" id="uploadimage" oninput="checkChanges()">
                        </div>
                    </div>
                </div>
                <div class="info-me">
                  <div class="intro">Basic Information</div>
                    <table>
                        <tr>
                            <td>Name</td>
                            <td><input type="text" id="input-clicked1" oninput="checkChanges()" onfocus="addBottomBorder(1);" onblur="removeBottomBorder(1)"></td>
                        </tr>
                        <tr>
                            <td>Address</td>
                            <td><input type="text" id="input-clicked2" oninput="checkChanges()" onfocus="addBottomBorder(2);" onblur="removeBottomBorder(2)"></td>
                        </tr>
                        <tr>
                            <td>Gender</td>
                            <td>Male</td>
                        </tr>
                        <tr>
                            <td>Date of Birth</td>
                            <td>January 1, 2000 A.D.</td>
                        </tr>
                        <tr>
                            <td>Contact</td>
                            <td><input type="number" id="input-clicked3" oninput="checkChanges()" onfocus="addBottomBorder(3);" onblur="removeBottomBorder(3)"></td>
                        </tr>
                        <tr>
                            <td>Email</td>
                            <td id="email">thaman@gmail.com</td>
                        </tr>
                        <tr>
                          <td>User Type</td>
                          <td>admin</td>
                        </tr>
                        <tr>
                          <td></td>
                          <td  class="irregular-profile"><button type="button" id="updateButton" onclick="updateForm()" disabled>Update</button></td>
                        </tr>
                    </table>


                </div>
            </div>
            
        </div>


    </form>
    <script src="../js/admin-userprofile.js"></script>
</body>
</html>
